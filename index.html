<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CV · Asistente</title>
    <!-- Fuentes & Librerías -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* —— variables y reset —— */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-light: #F5F5F7;
            --card-bg: #FFFFFF;
            --text-primary: #1C1C1E;
            --text-secondary: #6C6C70;
            --accent: #007AFF;
            --error-bg: #FFE5E5;
            --error-text: #C00;
            --bot-bubble: #FFFFFF;
            --user-bubble: #007AFF;
            --border-light: rgba(0,0,0,0.05);
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 30px rgba(0,0,0,0.12);
            --backdrop-blur: blur(10px);
            --font-sans: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-serif: 'DM Serif Display', Georgia, serif;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-light);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            margin: 0;
            line-height: 1.5;
        }

        /* —— contenedores principales —— */
        #landing-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
            text-align: center;
            padding: 24px;
            transition: opacity 0.35s ease, transform 0.35s ease;
            opacity: 1;
            transform: translateY(0);
        }

        #landing-page.hidden {
            display: none;
            opacity: 0;
            pointer-events: none;
        }

        #app-container {
            display: none;
            flex-direction: column;
            width: 100%;
            max-width: 860px;
            margin: 0 auto;
            height: 100vh;
            max-height: 780px;
            background: transparent;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: var(--shadow-md);
            backdrop-filter: none;
            transition: opacity 0.35s ease;
        }

        #app-container.visible {
            display: flex;
        }

        /* —— landing —— */
        .landing-title {
            font-family: var(--font-serif);
            font-size: 3.4rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
            color: #1D1D1F;
        }

        .landing-sub {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 48px;
            font-weight: 400;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            padding: 16px 36px;
            border-radius: 60px;
            font-size: 1.25rem;
            font-weight: 500;
            font-family: var(--font-sans);
            box-shadow: 0 4px 14px rgba(0,122,255,0.3);
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(4px);
        }

        .btn-primary:active {
            transform: scale(0.97);
            box-shadow: 0 2px 8px rgba(0,122,255,0.4);
        }

        /* —— cabecera app —— */
        .app-header {
            background: rgba(245,245,247,0.75);
            backdrop-filter: var(--backdrop-blur);
            -webkit-backdrop-filter: var(--backdrop-blur);
            padding: 18px 24px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .progress-container {
            flex: 1;
            height: 6px;
            background: rgba(0,0,0,0.06);
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent);
            border-radius: 20px;
            transition: width 0.3s ease;
        }

        .step-indicator {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* —— grid principal —— */
        .main-grid {
            flex: 1;
            display: flex;
            background: transparent;
            padding: 16px;
            gap: 16px;
            min-height: 0;
        }

        /* chat panel */
        .chat-panel {
            flex: 1.2;
            background: var(--card-bg);
            border-radius: 28px;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(2px);
        }

        .chat-messages {
            flex: 1;
            padding: 20px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .bubble {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 22px;
            font-size: 1rem;
            line-height: 1.45;
            word-break: break-word;
        }

        .bot-bubble {
            align-self: flex-start;
            background: var(--bot-bubble);
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(0,0,0,0.02);
            color: var(--text-primary);
            border-bottom-left-radius: 6px;
        }

        .user-bubble {
            align-self: flex-end;
            background: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 6px;
        }

        .error-bubble {
            background: var(--error-bg);
            color: var(--error-text);
            border-left: 3px solid var(--error-text);
            font-weight: 500;
            align-self: flex-start;
        }

        .chat-input-area {
            padding: 16px 16px 20px;
            background: var(--card-bg);
            border-top: 1px solid var(--border-light);
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            background: #F2F2F6;
            border-radius: 40px;
            padding: 6px 6px 6px 22px;
            align-items: center;
        }

        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 0;
            font-size: 1rem;
            font-family: var(--font-sans);
            outline: none;
            color: var(--text-primary);
        }

        .input-wrapper input::placeholder {
            color: #8E8E93;
        }

        .send-btn {
            background: var(--accent);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 2px 8px rgba(0,122,255,0.3);
        }

        .send-btn:active {
            transform: scale(0.92);
        }

        .send-btn.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        /* —— preview panel (desktop visible, mobile modal) —— */
        .preview-panel {
            flex: 1;
            background: var(--card-bg);
            border-radius: 28px;
            box-shadow: var(--shadow-sm);
            padding: 20px 18px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .cv-preview {
            font-family: var(--font-sans);
            color: #1e1e1f;
        }

        .cv-name {
            font-family: var(--font-serif);
            font-size: 2.1rem;
            font-weight: 400;
            margin-bottom: 4px;
            letter-spacing: -0.02em;
        }

        .cv-title {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
            border-bottom: 1px solid #E5E5EA;
            padding-bottom: 16px;
        }

        .cv-section-title {
            font-weight: 600;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            margin: 18px 0 8px;
            color: #3A3A3C;
        }

        .cv-text {
            margin-bottom: 8px;
        }

        /* —— pdf mode —— */
        #cv-preview-container.pdf-mode {
            width: 210mm !important;
            height: 297mm !important;
            font-size: 11pt !important;
            padding: 20mm !important;
            background: white;
            box-sizing: border-box;
            overflow: visible;
        }

        /* mobile action */
        .mobile-preview-bar {
            display: none;
        }

        /* —— bottom sheet modal —— */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 1000;
            display: flex;
            align-items: flex-end;
            visibility: hidden;
            opacity: 0;
            transition: 0.25s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .bottom-sheet {
            background: var(--card-bg);
            width: 100%;
            max-height: 90vh;
            border-radius: 32px 32px 0 0;
            padding: 20px 18px 28px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.2,0.9,0.4,1);
            overflow-y: auto;
            box-shadow: 0 -8px 30px rgba(0,0,0,0.2);
        }

        .modal-overlay.active .bottom-sheet {
            transform: translateY(0);
        }

        .sheet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .sheet-header h3 {
            font-weight: 500;
            font-size: 1.4rem;
        }

        .close-sheet {
            background: #F2F2F6;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 30px;
            font-size: 1.6rem;
            line-height: 1;
            cursor: pointer;
            color: var(--text-secondary);
        }

        /* —— responsive —— */
        @media (max-width: 640px) {
            body { padding: 0; align-items: flex-start; }
            #app-container { max-height: 100vh; border-radius: 0; }
            .main-grid { padding: 8px; gap: 8px; }
            .preview-panel { display: none; }
            .mobile-preview-bar {
                display: flex;
                padding: 12px 20px 16px;
                justify-content: center;
                background: transparent;
            }
            .btn-outline {
                background: rgba(255,255,255,0.7);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border: 1px solid rgba(0,0,0,0.05);
                padding: 14px 24px;
                border-radius: 40px;
                font-weight: 500;
                box-shadow: var(--shadow-sm);
                width: fit-content;
                cursor: pointer;
                color: var(--accent);
            }
            .landing-title { font-size: 2.8rem; }
        }

        /* util */
        .text-muted { color: var(--text-secondary); }
    </style>
</head>
<body>

<!-- LANDING -->
<div id="landing-page">
    <div class="landing-title">CV·Flow</div>
    <div class="landing-sub">Asistente conversacional · Apple clean</div>
    <button class="btn-primary" id="start-btn">Generar mi CV</button>
</div>

<!-- APP PRINCIPAL -->
<div id="app-container">
    <header class="app-header">
        <span class="step-indicator" id="step-indicator">1/10</span>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar" style="width: 10%;"></div>
        </div>
    </header>

    <div class="main-grid">
        <!-- CHAT PANEL -->
        <div class="chat-panel">
            <div class="chat-messages" id="chat-messages"></div>
            <div class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="Escribe tu respuesta..." autocomplete="off" enterkeyhint="send">
                    <button class="send-btn" id="send-btn" aria-label="Enviar">↑</button>
                </div>
            </div>
        </div>

        <!-- PREVIEW (desktop) -->
        <div class="preview-panel" id="preview-panel">
            <div id="cv-preview-container" class="cv-preview">
                <!-- CV dinámico -->
            </div>
        </div>
    </div>

    <!-- barra móvil para abrir preview -->
    <div class="mobile-preview-bar">
        <div class="btn-outline" id="open-preview-btn">👁 Vista previa del CV</div>
    </div>
</div>

<!-- MODAL BOTTOM SHEET (móvil) -->
<div class="modal-overlay" id="preview-modal">
    <div class="bottom-sheet">
        <div class="sheet-header">
            <h3>Tu CV</h3>
            <button class="close-sheet" id="close-modal-btn">✕</button>
        </div>
        <div id="modal-cv-container" class="cv-preview">
            <!-- se renderiza igual que preview normal -->
        </div>
        <div style="margin-top: 20px; display: flex; gap: 12px;">
            <button class="btn-primary" id="download-pdf-modal" style="flex:1; padding: 14px;">📄 Descargar PDF</button>
        </div>
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ---------- STATE & FLUJO ----------
        const steps = [
            { field: 'nombre', question: 'Hola, ¿cuál es tu nombre completo?', type: 'text', polish: 'nombre' },
            { field: 'titulo', question: 'Define tu título (ej: Ingeniero Senior).', type: 'text', polish: 'titulo' },
            { field: 'email', question: 'Tu correo electrónico.', type: 'email', polish: 'email' },
            { field: 'telefono', question: 'Tu teléfono.', type: 'tel', polish: 'plain' },
            { field: 'resumen', question: 'Escribe un resumen profesional (3-4 líneas). No empieces con "Yo soy".', type: 'long', polish: 'resumen' },
            { field: 'habilidades', question: 'Lista habilidades separadas por comas.', type: 'text', polish: 'habilidades' },
            { field: 'puesto', question: '¿Cuál es tu puesto actual?', type: 'text', polish: 'puesto' },
            { field: 'empresaFechas', question: 'Empresa y fechas (ej: "Acme Corp | 2020–Presente")', type: 'text', polish: 'plain' },
            { field: 'logros', question: 'Describe logros medibles.', type: 'long', polish: 'logros' }
        ];

        const state = {
            stepIndex: 0,
            nombre: '', titulo: '', email: '', telefono: '', resumen: '',
            habilidades: '', puesto: '', empresaFechas: '', logros: '',
            isFinished: false,
            errorRetry: false
        };

        // UI elements
        const landing = document.getElementById('landing-page');
        const app = document.getElementById('app-container');
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const stepIndicator = document.getElementById('step-indicator');
        const progressBar = document.getElementById('progress-bar');
        const previewContainer = document.getElementById('cv-preview-container');
        const modalOverlay = document.getElementById('preview-modal');
        const modalCvContainer = document.getElementById('modal-cv-container');
        const openPreviewBtn = document.getElementById('open-preview-btn');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const downloadPdfModal = document.getElementById('download-pdf-modal');

        // helper polish
        function polishText(text, type) {
            if (!text) return text;
            let polished = text.trim();
            if (polished === '') return polished;

            // Eliminar muletillas iniciales para resumen/logros
            if (type === 'resumen' || type === 'logros') {
                const lower = polished.toLowerCase();
                const prefixes = ['soy ', 'estoy ', 'tengo ', 'mi experiencia es ', 'yo soy '];
                for (let p of prefixes) {
                    if (lower.startsWith(p)) {
                        polished = polished.slice(p.length);
                        break;
                    }
                }
            }

            // Capitalizar primera letra si no es email
            if (type !== 'email' && polished.length > 0) {
                polished = polished.charAt(0).toUpperCase() + polished.slice(1);
            }

            // Asegurar punto final en resumen/logros largos (>30 chars y sin .!?)
            if ((type === 'resumen' || type === 'logros') && polished.length > 30) {
                if (!/[.!?]$/.test(polished)) polished += '.';
            }
            return polished;
        }

        // validación según campo
        function validateField(value, field, type) {
            if (!value || value.trim() === '') return 'Este campo no puede estar vacío.';
            if (field === 'email') {
                if (!value.includes('@') || !value.includes('.')) return 'El email debe contener "@" y un punto.';
            }
            if (field === 'resumen' && value.length < 20) return 'El resumen debe tener al menos 20 caracteres.';
            if (field === 'logros' && value.length < 10) return 'Describe logros con más detalle.';
            return null;
        }

        // actualizar preview
        function updatePreview() {
            const cvHtml = `
                <div class="cv-name">${state.nombre || 'Tu Nombre'}</div>
                <div class="cv-title">${state.titulo || 'Título profesional'}</div>
                <div style="display:flex; gap:16px; flex-wrap:wrap; margin-bottom:12px; font-size:0.9rem;">
                    <span>✉️ ${state.email || 'email@ejemplo.com'}</span>
                    <span>📞 ${state.telefono || '+34 600 000 000'}</span>
                </div>
                <div class="cv-section-title">Resumen</div>
                <div class="cv-text">${state.resumen || 'Resumen profesional pendiente...'}</div>
                <div class="cv-section-title">Habilidades</div>
                <div class="cv-text">${state.habilidades || 'Tus habilidades'}</div>
                <div class="cv-section-title">Experiencia</div>
                <div style="font-weight:600;">${state.puesto || 'Puesto'}</div>
                <div class="text-muted" style="margin-bottom:6px;">${state.empresaFechas || 'Empresa · Fechas'}</div>
                <div class="cv-text">${state.logros || 'Logros destacados.'}</div>
                <div style="margin-top:24px; border-top:1px solid #eee;"></div>
            `;
            previewContainer.innerHTML = cvHtml;
            modalCvContainer.innerHTML = cvHtml;
        }

        // render chat
        function addMessage(text, sender, isError = false) {
            const div = document.createElement('div');
            div.className = `bubble ${sender}-bubble ${isError ? 'error-bubble' : ''}`;
            div.textContent = text;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function botQuestion(question) {
            addMessage(question, 'bot');
        }

        function userAnswer(answer) {
            addMessage(answer, 'user');
        }

        function errorMessage(msg) {
            addMessage(msg, 'bot', true);
        }

        function updateProgress() {
            const total = steps.length;
            const current = state.isFinished ? total : state.stepIndex;
            const percent = Math.min(100, Math.round((current / total)*100));
            progressBar.style.width = percent + '%';
            stepIndicator.textContent = `${state.isFinished ? total : state.stepIndex}/${total}`;
        }

        // avanzar paso
        function processInput(rawValue) {
            if (state.isFinished) {
                addMessage('Ya has completado tu CV. Puedes ver la vista previa.', 'bot');
                return;
            }

            const step = steps[state.stepIndex];
            const field = step.field;
            const type = step.type;
            
            let polished = polishText(rawValue, step.polish);
            const validationError = validateField(polished, field, type);
            
            if (validationError) {
                errorMessage(validationError + ' Intenta de nuevo.');
                // repetir misma pregunta
                botQuestion(step.question);
                return;
            }

            // guardar
            state[field] = polished;
            userAnswer(polished);
            
            // siguiente paso
            state.stepIndex++;
            
            if (state.stepIndex < steps.length) {
                const nextStep = steps[state.stepIndex];
                botQuestion(nextStep.question);
            } else {
                state.isFinished = true;
                botQuestion('¡CV listo! Revisa la vista previa. Puedes descargarlo en PDF.');
            }
            
            updatePreview();
            updateProgress();
        }

        function resetAndStart() {
            // reset state
            state.stepIndex = 0;
            ['nombre','titulo','email','telefono','resumen','habilidades','puesto','empresaFechas','logros'].forEach(k=> state[k]='');
            state.isFinished = false;
            chatMessages.innerHTML = '';
            const firstQuestion = steps[0].question;
            botQuestion(firstQuestion);
            updatePreview();
            updateProgress();
            userInput.value = '';
            userInput.focus();
        }

        // UI listeners
        document.getElementById('start-btn').addEventListener('click', ()=>{
            landing.classList.add('hidden');
            app.classList.add('visible');
            resetAndStart();
        });

        sendBtn.addEventListener('click', ()=>{
            const val = userInput.value.trim();
            if (!val) return;
            processInput(val);
            userInput.value = '';
        });

        userInput.addEventListener('keypress', (e)=>{
            if (e.key === 'Enter') {
                e.preventDefault();
                sendBtn.click();
            }
        });

        // modal mobile
        openPreviewBtn.addEventListener('click', ()=>{
            modalOverlay.classList.add('active');
            updatePreview(); // asegura sincro
        });
        closeModalBtn.addEventListener('click', ()=>{
            modalOverlay.classList.remove('active');
        });
        modalOverlay.addEventListener('click', (e)=>{
            if (e.target === modalOverlay) modalOverlay.classList.remove('active');
        });

        // PDF: solución exacta
        async function downloadPDF() {
            const container = previewContainer; // usamos el mismo contenedor
            const originalClasses = container.className;
            
            // añadir pdf-mode
            container.classList.add('pdf-mode');
            
            // esperar 500ms render
            await new Promise(r => setTimeout(r, 500));
            
            const opt = {
                margin:        [0.5, 0.5, 0.5, 0.5],
                filename:      `CV_${state.nombre || 'perfil'}.pdf`,
                image:         { type: 'jpeg', quality: 0.98 },
                html2canvas:   { scale: 2, letterRendering: true, useCORS: true },
                jsPDF:         { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            
            try {
                await html2pdf().set(opt).from(container).save();
            } catch (e) {
                alert('Error generando PDF');
            }
            
            container.classList.remove('pdf-mode');
            container.className = originalClasses;
        }

        downloadPdfModal.addEventListener('click', (e)=>{
            e.stopPropagation();
            downloadPDF();
        });

        // también se puede añadir un botón en preview desktop (opcional pero no necesario)
        // creamos un pequeño botón flotante dentro del preview panel
        const previewPanel = document.getElementById('preview-panel');
        const pdfBtnDesktop = document.createElement('button');
        pdfBtnDesktop.textContent = '⬇ PDF';
        pdfBtnDesktop.style.cssText = 'margin-top:16px; background: #007AFF; color:white; border:none; padding:12px; border-radius:40px; font-weight:500; cursor:pointer;';
        pdfBtnDesktop.addEventListener('click', downloadPDF);
        previewPanel.appendChild(pdfBtnDesktop);

        // actualizar preview al inicio
        updatePreview();
        
        // Si se cierra modal sin descargar
        window.addEventListener('keydown', (e) => { if(e.key==='Escape') modalOverlay.classList.remove('active'); });
    })();
</script>
</body>
</html>
