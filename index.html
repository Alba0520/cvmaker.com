<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>CV Builder Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  /* ─── CORE VARIABLES ─────────────────────────────────── */
  :root {
    --bg: #F5F5F7; /* Apple Light Gray */
    --surface: #FFFFFF;
    --text-main: #1D1D1F;
    --text-sec: #86868B;
    --accent: #0071E3; /* Apple Blue */
    --accent-dark: #005BB5;
    --error: #FF3B30;
    --border: #D2D2D7;
    
    --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-display: 'DM Serif Display', serif;
    
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
    --radius: 20px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; font-family: var(--font-body); background: var(--bg); color: var(--text-main); height: 100vh; overflow: hidden; }

  /* ─── LANDING PAGE (Nueva Pantalla de Inicio) ──────────── */
  #landing-page {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1000;
    padding: 20px;
    text-align: center;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  #landing-page.hidden {
    opacity: 0; pointer-events: none;
    transform: scale(0.95);
  }
  .landing-logo {
    width: 80px; height: 80px; background: #000; border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }
  .landing-logo svg { width: 40px; height: 40px; fill: #fff; }
  .landing-title { font-family: var(--font-display); font-size: 3rem; line-height: 1.1; margin-bottom: 16px; }
  .landing-sub { color: var(--text-sec); font-size: 1.2rem; max-width: 400px; line-height: 1.5; margin-bottom: 40px; }
  .btn-start {
    background: #000; color: #fff; border: none;
    font-size: 1.1rem; font-weight: 600; padding: 16px 40px;
    border-radius: 50px; cursor: pointer;
    transition: transform 0.2s, background 0.2s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }
  .btn-start:active { transform: scale(0.96); }

  /* ─── APP CONTAINER ───────────────────────────────────── */
  #app-container {
    display: none; /* Oculto hasta empezar */
    flex-direction: column; height: 100%; width: 100%;
    opacity: 0; transition: opacity 0.5s ease 0.3s;
  }
  #app-container.visible { opacity: 1; }

  /* HEADER */
  header {
    height: 60px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between;
    background: rgba(245,245,247,0.9); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border); z-index: 20; flex-shrink: 0;
  }
  .brand { font-weight: 700; font-size: 18px; display: flex; align-items: center; gap: 8px; }
  .progress-bar-container { flex: 1; margin: 0 20px; height: 6px; background: #E5E5EA; border-radius: 3px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--text-main); width: 0%; transition: width 0.4s ease; }

  /* MAIN CONTENT GRID */
  .main-grid { flex: 1; display: flex; overflow: hidden; position: relative; }

  /* CHAT AREA */
  .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg); max-width: 100%; }
  .messages {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 16px;
    padding-bottom: 100px; /* Espacio para el input móvil */
  }
  
  /* Bubbles */
  .msg {
    max-width: 85%; padding: 14px 18px; border-radius: 20px;
    font-size: 16px; line-height: 1.5; animation: msgIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes msgIn { from { opacity: 0; transform: translateY(10px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
  
  .msg.bot { background: #fff; color: var(--text-main); border-bottom-left-radius: 4px; align-self: flex-start; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
  .msg.user { background: #000; color: #fff; border-bottom-right-radius: 4px; align-self: flex-end; }
  .msg.error { background: #FFF0F0; color: #FF3B30; border: 1px solid #FFCCCC; align-self: flex-start; font-size: 14px; }

  /* INPUT AREA */
  .input-area {
    position: absolute; bottom: 0; left: 0; width: 100%;
    background: rgba(255,255,255,0.95); border-top: 1px solid var(--border);
    padding: 12px 16px 30px; /* Padding extra para notches */
    display: flex; gap: 10px; align-items: flex-end;
    z-index: 30;
  }
  textarea {
    flex: 1; border: 1px solid #C7C7CC; border-radius: 20px; padding: 12px 16px;
    font-family: var(--font-body); font-size: 16px; resize: none; max-height: 120px;
    background: #F2F2F7; outline: none; transition: border 0.2s;
  }
  textarea:focus { border-color: var(--accent); background: #fff; }
  .btn-send {
    width: 44px; height: 44px; border-radius: 50%; background: var(--accent); color: #fff;
    border: none; display: flex; align-items: center; justify-content: center; cursor: pointer;
    opacity: 0.5; transition: opacity 0.2s;
  }
  .btn-send.ready { opacity: 1; }

  /* ─── PREVIEW PANEL (Mobile Overlay) ───────────────────── */
  .preview-panel {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #E5E5EA; z-index: 50;
    display: flex; flex-direction: column;
    transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .preview-panel.open { transform: translateY(0); }
  
  .preview-header {
    height: 60px; background: #fff; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
    flex-shrink: 0;
  }
  .close-btn { font-size: 16px; font-weight: 600; color: var(--accent); background: none; border: none; cursor: pointer; }
  
  .preview-scroll { flex: 1; overflow-y: auto; padding: 20px; display: flex; justify-content: center; }

  /* CV A4 CANVAS */
  .cv-page {
    background: #fff; width: 100%; max-width: 450px; 
    min-height: 297mm; /* A4 Height */
    aspect-ratio: 210/297;
    padding: 30px; box-shadow: var(--shadow);
    font-family: var(--font-body); color: #000;
    transform-origin: top center;
  }
  
  /* PDF MODE: Forzar tamaño real al descargar */
  .cv-page.pdf-mode {
    width: 210mm !important; height: 297mm !important; max-width: none !important;
    transform: none !important; padding: 20mm !important;
    font-size: 11pt !important;
  }

  /* CV Styling Internal */
  .cv-name { font-family: var(--font-display); font-size: 32px; line-height: 1.1; margin-bottom: 8px; }
  .cv-head { border-bottom: 2px solid #000; padding-bottom: 15px; margin-bottom: 20px; }
  .cv-title { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; color: #444; }
  .cv-contact { margin-top: 8px; font-size: 11px; color: #555; }
  .cv-section { margin-bottom: 24px; }
  .cv-sec-title { font-size: 12px; font-weight: 700; text-transform: uppercase; border-bottom: 1px solid #ddd; padding-bottom: 5px; margin-bottom: 12px; letter-spacing: 0.5px; }
  .cv-text { font-size: 11px; line-height: 1.6; color: #222; }
  .cv-item { margin-bottom: 16px; }
  .cv-role { font-weight: 700; font-size: 13px; }
  .cv-date { float: right; font-size: 11px; color: #666; font-weight: 500; }

  /* ─── MOBILE ACTION BAR (Bottom Bar) ──────────────────── */
  /* En lugar de un botón flotante, una barra completa estilo app nativa */
  .mobile-action-bar {
    position: fixed; bottom: 0; left: 0; width: 100%;
    background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
    border-top: 1px solid var(--border);
    padding: 12px 20px 30px; /* Safe area */
    display: flex; justify-content: space-between; align-items: center;
    z-index: 40;
    transform: translateY(100%); transition: transform 0.3s;
  }
  /* Mostrar barra solo cuando el input NO tiene foco */
  .input-area:not(:focus-within) ~ .mobile-action-bar { transform: translateY(0); }
  
  .btn-preview-action {
    flex: 1; background: #F2F2F7; color: #000; border: none;
    padding: 14px; border-radius: 12px; font-weight: 600; font-size: 15px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    cursor: pointer;
  }
  .btn-preview-action:active { background: #E5E5EA; }

  /* Desktop Adjustments */
  @media (min-width: 1024px) {
    .preview-panel { 
      position: static; transform: none !important; width: 45%; 
      border-left: 1px solid var(--border); display: flex; background: #E5E5EA;
    }
    .preview-header { display: none; }
    .chat-area { max-width: 55%; border-right: 1px solid var(--border); }
    .mobile-action-bar { display: none; }
    .cv-page { transform: scale(0.9); margin-top: 20px; }
  }
</style>
</head>
<body>

<!-- 1. LANDING PAGE -->
<div id="landing-page">
  <div class="landing-logo">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
  </div>
  <h1 class="landing-title">CV Profesional<br>en minutos.</h1>
  <p class="landing-sub">IA experta que ayuda a redactar, valida tus datos y genera un PDF optimizado para ATS.</p>
  <button class="btn-start" onclick="startApp()">Generar mi CV</button>
</div>

<!-- 2. APP CONTAINER -->
<div id="app-container">
  <header>
    <div class="brand">CV Pro</div>
    <div class="progress-bar-container"><div class="progress-bar-fill" id="progressBar"></div></div>
    <button id="btnDownload" style="background:none; border:none; font-weight:600; color:var(--accent); opacity:0.5; pointer-events:none;" onclick="downloadPDF()">
      Descargar
    </button>
  </header>

  <div class="main-grid">
    <!-- CHAT -->
    <section class="chat-area">
      <div class="messages" id="messagesContainer"></div>
      
      <div class="input-area">
        <textarea id="userInput" rows="1" placeholder="Escribe aquí..." oninput="resizeInput(this)" onkeydown="checkKey(event)"></textarea>
        <button class="btn-send" id="sendBtn" onclick="handleSend()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path></svg>
        </button>
      </div>

      <!-- BARRA MÓVIL ACCIONES -->
      <div class="mobile-action-bar">
        <button class="btn-preview-action" onclick="togglePreview()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          Ver Vista Previa
        </button>
      </div>
    </section>

    <!-- PREVIEW -->
    <section class="preview-panel" id="previewPanel">
      <div class="preview-header">
        <span style="font-weight:600">Vista Previa</span>
        <button class="close-btn" onclick="togglePreview()">Cerrar</button>
      </div>
      <div class="preview-scroll">
        <div class="cv-page" id="cvContent"></div>
      </div>
    </section>
  </div>
</div>

<script>
/* ───── ESTADO ───── */
const state = { name:'', title:'', email:'', phone:'', summary:'', skills:'', exp:[], lang:'', tools:'' };
let currentStep = 0;
let tempExp = {};

/* ───── PASOS ───── */
const STEPS = [
  { id:'name',    p:10, q:"¡Hola! 👋 Empecemos. ¿Cuál es tu **Nombre Completo**?" },
  { id:'title',   p:20, q:"Genial, {name}. Ahora define tu **Título Profesional** (ej: 'Ingeniero de Software Senior')." },
  { id:'email',   p:30, q:"Necesito tu **Email**. Recuerda incluir el '@' para que sea válido." },
  { id:'phone',   p:40, q:"Y tu **Teléfono** de contacto." },
  { id:'summary', p:55, q:"Escribe un breve **Resumen Profesional** (3-4 líneas). No empieces con 'Yo soy', ve directo al grano.", multi:true },
  { id:'skills',  p:70, q:"Lista tus **Habilidades** separadas por comas (ej: Python, Inglés C1, Liderazgo)." },
  { id:'role',    p:80, q:"Hablemos de experiencia. ¿Cuál es tu **puesto actual**?" },
  { id:'company', p:90, q:"¿Nombre de la **Empresa** y **Fechas**?" },
  { id:'desc',    p:95, q:"Describe tus **logros** en ese puesto. Usa números si es posible.", multi:true },
  { id:'end',     p:100,q:"¡Increíble! 🎉 Tu CV está listo. Revisa la vista previa y descarga tu PDF.", end:true }
];

/* ───── LÓGICA DE APP ───── */
function startApp() {
  document.getElementById('landing-page').classList.add('hidden');
  const app = document.getElementById('app-container');
  app.style.display = 'flex';
  // Forzar reflow
  void app.offsetWidth; 
  app.classList.add('visible');
  
  setTimeout(() => {
    runStep();
  }, 800);
}

function runStep() {
  const step = STEPS[currentStep];
  document.getElementById('progressBar').style.width = step.p + '%';
  
  if (step.end) {
    document.getElementById('userInput').style.display = 'none';
    document.getElementById('sendBtn').style.display = 'none';
    const dlBtn = document.getElementById('btnDownload');
    dlBtn.style.opacity = '1';
    dlBtn.style.pointerEvents = 'all';
  }

  // Simular "Escribiendo..."
  showTyping().then(() => {
    let msg = step.q.replace('{name}', state.name ? state.name.split(' ')[0] : '');
    addMsg(msg, 'bot');
  });
}

function showTyping() {
  return new Promise(resolve => {
    const d = document.createElement('div');
    d.className = 'msg bot';
    d.style.color = '#888';
    d.innerHTML = '<span style="animation: blink 1s infinite">●</span>';
    document.getElementById('messagesContainer').appendChild(d);
    window.scrollTo(0, document.body.scrollHeight);
    setTimeout(() => { d.remove(); resolve(); }, 800);
  });
}

function addMsg(txt, type) {
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.innerHTML = txt.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  document.getElementById('messagesContainer').appendChild(div);
  window.scrollTo(0, document.body.scrollHeight);
}

/* ───── VALIDACIÓN INTELIGENTE ───── */
function validateInput(stepId, val) {
  val = val.trim();
  if (!val) return { valid: false, msg: "Por favor, escribe algo para continuar." };
  
  if (stepId === 'email') {
    if (!val.includes('@') || !val.includes('.')) {
      return { valid: false, msg: "⚠️ El email no parece válido. Te has olvidado el '@' o el dominio." };
    }
  }
  if (stepId === 'summary' && val.length < 20) {
    return { valid: false, msg: "El resumen es muy corto. Cuéntame un poco más sobre tu experiencia." };
  }
  return { valid: true };
}

/* ───── PROCESAR INPUT ───── */
function handleSend() {
  const input = document.getElementById('userInput');
  const val = input.value.trim();
  if (!val) return;

  // 1. Validar
  const step = STEPS[currentStep];
  const validation = validateInput(step.id, val);
  
  if (!validation.valid) {
    addMsg(validation.msg, 'error');
    input.value = '';
    input.focus();
    return;
  }

  // 2. Mostrar usuario y limpiar
  addMsg(val, 'user');
  input.value = '';
  input.style.height = 'auto';

  // 3. Guardar y Procesar
  saveData(step.id, val);
  renderCV();

  // 4. Siguiente paso
  if (!step.end) {
    currentStep++;
    runStep();
  }
}

function saveData(id, val) {
  // Pulsión simple de texto (IA Mockup)
  let clean = val.charAt(0).toUpperCase() + val.slice(1);
  if (id === 'summary' || id === 'desc') {
    clean = clean.replace(/^(Soy |Estoy |Tengo |Mi experiencia es )/i, ''); // Quitar "Yo"
    if (!clean.endsWith('.')) clean += '.';
  }

  if (id === 'role') tempExp.role = clean;
  else if (id === 'company') tempExp.company = clean;
  else if (id === 'desc') { tempExp.desc = clean; state.exp.push({...tempExp}); tempExp = {}; }
  else state[id] = clean;
}

/* ───── RENDER CV ───── */
function renderCV() {
  const c = document.getElementById('cvContent');
  const d = (t) => t ? `<div class="cv-text">${t}</div>` : '';
  
  c.innerHTML = `
    <div class="cv-name">${state.name || 'Tu Nombre'}</div>
    <div class="cv-head">
      <div class="cv-title">${state.title || 'Tu Título'}</div>
      <div class="cv-contact">${state.email || 'email@ejemplo.com'} | ${state.phone || '+34 600...'}</div>
    </div>
    ${state.summary ? `<div class="cv-section"><div class="cv-sec-title">Perfil</div>${d(state.summary)}</div>` : ''}
    ${state.skills ? `<div class="cv-section"><div class="cv-sec-title">Habilidades</div>${d(state.skills)}</div>` : ''}
    ${state.exp.length ? `<div class="cv-section"><div class="cv-sec-title">Experiencia</div>
      ${state.exp.map(e => `<div class="cv-item"><div class="cv-role">${e.role} <span class="cv-date">${e.company}</span></div>${d(e.desc)}</div>`).join('')}
    </div>` : ''}
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
      ${state.lang ? `<div><div class="cv-sec-title">Idiomas</div>${d(state.lang)}</div>` : ''}
      ${state.tools ? `<div><div class="cv-sec-title">Herramientas</div>${d(state.tools)}</div>` : ''}
    </div>
  `;
}

/* ───── PDF DOWNLOAD FIX ───── */
async function downloadPDF() {
  const btn = document.getElementById('btnDownload');
  btn.innerText = '...';
  
  const el = document.getElementById('cvContent');
  const panel = document.getElementById('previewPanel');
  
  // Asegurar que el panel sea visible temporalmente para el renderizado correcto
  const wasClosed = !panel.classList.contains('open');
  if(wasClosed) panel.classList.add('open');

  // Activar modo A4
  el.classList.add('pdf-mode');
  
  // Esperar render
  await new Promise(r => setTimeout(r, 500));

  await html2pdf().set({
    margin: 0,
    filename: `CV_${state.name.replace(/\s/g,'_')}.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  }).from(el).save();

  el.classList.remove('pdf-mode');
  if(wasClosed) panel.classList.remove('open');
  btn.innerText = 'Descargar';
}

/* ───── UTILS ───── */
function resizeInput(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
  document.getElementById('sendBtn').classList.toggle('ready', el.value.trim().length > 0);
}
function checkKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } }
function togglePreview() { document.getElementById('previewPanel').classList.toggle('open'); }
</script>
</body>
</html>
